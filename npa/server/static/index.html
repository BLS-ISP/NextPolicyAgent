<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NPA – Next Policy Agent</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🛡️%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="/static/css/npa.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css"
          crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css"
          crossorigin="anonymous" referrerpolicy="no-referrer">
</head>
<body>
    <!-- Login Screen (shown when no session) -->
    <div id="login-screen" class="login-screen hidden">
        <div class="login-card">
            <div class="login-header">
                <span class="logo-icon" style="font-size:48px">🛡️</span>
                <h1 class="logo-text" style="font-size:28px;margin-top:8px">NPA</h1>
                <p class="text-muted" style="margin-top:4px">Next Policy Agent</p>
            </div>
            <form id="login-form" autocomplete="on">
                <div class="form-group">
                    <label class="form-label" for="login-user">Username</label>
                    <input type="text" class="form-input" id="login-user" name="username"
                           autocomplete="username" required autofocus>
                </div>
                <div class="form-group">
                    <label class="form-label" for="login-pass">Password</label>
                    <input type="password" class="form-input" id="login-pass" name="password"
                           autocomplete="current-password" required>
                </div>
                <div id="login-error" class="login-error hidden"></div>
                <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px">Login</button>
            </form>
        </div>
    </div>

    <!-- Main App (hidden until logged in) -->
    <div id="app" class="hidden">
        <aside id="sidebar">
            <div class="sidebar-header">
                <div class="logo-group">
                    <span class="logo-icon">🛡️</span>
                    <h1 class="logo-text">NPA</h1>
                </div>
                <span class="version-badge">v0.1.0</span>
            </div>
            <nav class="sidebar-nav" id="main-nav">
                <a href="#/dashboard" class="nav-item active" data-page="dashboard">
                    <span class="nav-icon">📊</span>
                    <span class="nav-label">Dashboard</span>
                </a>
                <a href="#/policies" class="nav-item" data-page="policies">
                    <span class="nav-icon">📜</span>
                    <span class="nav-label">Policies</span>
                </a>
                <a href="#/playground" class="nav-item" data-page="playground">
                    <span class="nav-icon">▶️</span>
                    <span class="nav-label">Playground</span>
                </a>
                <a href="#/data" class="nav-item" data-page="data">
                    <span class="nav-icon">🗄️</span>
                    <span class="nav-label">Data Browser</span>
                </a>
                <a href="#/bundles" class="nav-item" data-page="bundles">
                    <span class="nav-icon">📦</span>
                    <span class="nav-label">Bundles</span>
                </a>
                <a href="#/logs" class="nav-item" data-page="logs">
                    <span class="nav-icon">📋</span>
                    <span class="nav-label">Decision Logs</span>
                </a>
                <div class="nav-divider"></div>
                <a href="#/config" class="nav-item" data-page="config">
                    <span class="nav-icon">⚙️</span>
                    <span class="nav-label">Configuration</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="server-status" id="server-status">
                    <span class="status-dot status-connecting"></span>
                    <span class="status-text">Connecting…</span>
                </div>
                <button class="btn btn-ghost btn-sm" id="logout-btn" style="width:100%;margin-top:8px">
                    🚪 Logout
                </button>
            </div>
        </aside>
        <main id="content">
            <div id="page-container">
                <div class="loading-container">
                    <div class="loading-spinner"></div>
                    <p>Loading NPA…</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Toast notifications -->
    <div id="toast-container"></div>

    <!-- Modal overlay -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal-content" id="modal-content"></div>
    </div>

    <!-- CodeMirror (CDN — falls back to plain textarea when offline) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"
            crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"
            crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"
            crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"
            crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <!-- NPA Application -->
    <script type="module" src="/static/js/app.js"></script>
</body>
</html>
