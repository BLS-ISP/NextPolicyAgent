; ==========================================================================
; NPA (Next Policy Agent) — Zentrale Konfigurationsdatei
; ==========================================================================
;
; Alle Start- und Stop-Parameter an einem Ort.
; Kommandozeilen-Argumente überschreiben die Werte aus dieser Datei.
;
; Pfade können absolut oder relativ zum Skript-Verzeichnis angegeben werden.
; Boolesche Werte: true/false
; Listen (z.B. bundles): kommagetrennt
;

[server]
; Adresse und Port, auf dem NPA lauscht
addr        = 0.0.0.0
port        = 8443
; Anzahl uvicorn Worker-Prozesse
workers     = 1
; CORS-Origins (kommagetrennt, * = alle)
cors_origins = *
; Max. Requests pro Minute pro Client (Rate-Limiting)
rate_limit  = 1000
; Request-Timeout in Sekunden
request_timeout = 30.0
; Max. Request-Body-Größe in Bytes (10 MB)
max_request_size = 10485760

[tls]
; TLS aktivieren (empfohlen für Produktion)
enabled       = true
; Pfad zum TLS-Zertifikat (leer = auto-generiert für Entwicklung)
cert_file     = certs/npa.crt
; Pfad zum privaten TLS-Schlüssel
key_file      = certs/npa.key
; Minimale TLS-Version
min_version   = TLSv1.2
; Automatisch selbstsigniertes Zertifikat generieren (nur Entwicklung)
auto_generate = true

[auth]
; API-Authentifizierung aktivieren
enabled       = false
; Token-Typ: bearer oder client_cert
token_type    = bearer
; JWT-Secret für Token-Validierung
jwt_secret    =
; JWT-Algorithmus
jwt_algorithm = HS256
; API-Keys (kommagetrennt)
api_keys      =

; --- Web-UI Login ---
ui_username   = admin
ui_password   = admin

[storage]
; Backend: memory oder disk
backend   = memory
; Pfad zur Datenbank-Datei (nur bei backend=disk)
disk_path = npa_data.db

[bundles]
; Bundle-Pfade (kommagetrennt, leer = keine)
paths =

[logging]
; Log-Level: debug, info, warning, error
level        = info
; Log-Format: json oder text
format       = json
; Decision-Log aktivieren
decision_log = false
; Log-Datei (relativ zum Skript-Verzeichnis)
log_file     = npa.log

[process]
; PID-Datei (relativ zum Skript-Verzeichnis)
pid_file          = npa.pid
; Im Vordergrund starten (true = blockierend)
foreground        = false
; Sekunden Wartezeit für Graceful Shutdown
shutdown_timeout  = 10
; Sekunden Wartezeit für Health-Check nach Start
health_check_timeout = 15
